name: CD Task Tracker

on:
  # Run CD only on main branch changes and manual triggers.
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  # Centralized config for reuse in jobs.
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/task-tracker

jobs:
  docker-build-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      # Fetch repository contents.
      - name: Checkout source
        uses: actions/checkout@v4

      # Enable Docker Buildx for modern builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to Docker Hub.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Create a simple tag list: latest and short SHA.
      - name: Set image tags
        run: echo "TAGS=${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      # Build and push the image.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.TAGS }}
